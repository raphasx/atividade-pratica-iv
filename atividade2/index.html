<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor Saboroso</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header class="header">
            <h1>Sabor Saboroso</h1>

            <nav class="menu">
                <a href="#">Home</a>
                <a href="#">Cardápio</a>
                <a href="#">Contato</a>
            </nav>
        </header>

        <section class="banner">
            <h2>Melhor Restaurante da Cidade</h2>
        </section>

        <section class="pratos">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=500" alt="Pizza">
                <h3>Pizza Especial</h3>
                <p>R$ 39,90</p>
                <button>Ver prato</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?w=500" alt="Hambúrguer">
                <h3>Hambúrguer Artesanal</h3>
                <p>R$ 29,90</p>
                <button>Ver prato</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1512058564366-18510be2db19?w=500" alt="Macarrão">
                <h3>Macarronada Italiana</h3>
                <p>R$ 34,90</p>
                <button>Ver prato</button>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?w=500" alt="Prato Executivo">
                <h3>Prato Executivo</h3>
                <p>R$ 24,90</p>
                <button>Ver prato</button>
            </div>

        </section>

        <section class="contato">
            <h2>Contato</h2>
            <p>Rua Central, 123 - Centro</p>
            <p>(33) 99999-9999</p>
            <button>Fale Conosco</button>
        </section>

        <footer class="footer">
            2026 Sabor Grill
        </footer>

    </div>

</body>
</html>
